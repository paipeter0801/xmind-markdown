# CI Pipeline — XMind to Markdown（靜態 Astro PWA）
# 改寫自 ENGINEERING_GUIDE §4。GitHub-hosted runner（非 self-hosted VPS），無 backup step。
name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: make install

      - name: Lint, Test, Build
        run: make ci

      - name: Cleanup Workspace
        if: always()
        run: make clean
